<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Colorpicker</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
<div class="colorpicker-container">
    <div class="sliders">
        <div class="slider-row">
            <span>0</span>
            <input type="range" id="slider-red" class="slider" min="0" max="255" value="25">
            <span>255</span>
            <label id="lbl-red" for="slider-red">Red 25</label>
        </div>
        <div class="slider-row">
            <span>0</span>
            <input type="range" id="slider-green" class="slider" min="0" max="255" value="206">
            <span>255</span>
            <label id="lbl-green" for="slider-green">Green 206</label>
        </div>
        <div class="slider-row">
            <span>0</span>
            <input type="range" id="slider-blue" class="slider" min="0" max="255" value="53">
            <span>255</span>
            <label id="lbl-blue" for="slider-blue">Blue 53</label>
        </div>
    </div>
    <div class="colorDemo"></div>
</div>
<script src="scripts/index.js"></script>
</body>
</html>
