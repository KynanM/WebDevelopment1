<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Formwaarden</title>
    <link type="text/css" rel="stylesheet" href="styles/styles.css">
</head>
<body>
<h1>Opdracht: Formwaarden</h1>

<div>
    <label><input type="checkbox" id="isRoker"> Is roker</label>
</div>

<div>
    <label>Moedertaal:</label>
    <label><input type="radio" name="moedertaal" value="nl" checked> Nederlands</label>
    <label><input type="radio" name="moedertaal" value="fr"> Frans</label>
    <label><input type="radio" name="moedertaal" value="en"> Engels</label>
</div>

<div>
    <label>Favoriete buurland:</label>
    <label for="favorieteBuurland"></label><select id="favorieteBuurland">
        <option value="Nederland">Nederland</option>
        <option value="Frankrijk">Frankrijk</option>
        <option value="Duitsland">Duitsland</option>
    </select>
</div>

<div>
    <label>Bestelling:</label><br>
    <label for="bestelling"></label><select id="bestelling" multiple size="6">
        <option value="aardappelen">aardappelen</option>
        <option value="brood">brood</option>
        <option value="melk">melk</option>
        <option value="biefstuk">biefstuk</option>
        <option value="chips">chips</option>
        <option value="krant">krant</option>
    </select>
</div>

<button id="btnToonResultaat">Toon resultaat</button>
<p>Bekijk de console voor het resultaat.</p>

<script src="scripts/index.js"></script>
</body>
</html>
