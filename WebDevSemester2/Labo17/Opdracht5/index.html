<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Formvalidatie</title>
    <link type="text/css" rel="stylesheet" href="styles/styles.css">
</head>
<body>
<h1>Opdracht: Formvalidatie</h1>

<div class="veld">
    <label>Voornaam:</label>
    <label for="voornaam"></label><input type="text" id="voornaam">
    <span id="errVoornaam" class="error"></span>
</div>

<div class="veld">
    <label>Familienaam:</label>
    <label for="familienaam"></label><input type="text" id="familienaam">
    <span id="errFamilienaam" class="error"></span>
</div>

<div class="veld">
    <label>Geboortedatum (jjjj-mm-dd):</label>
    <label for="geboortedatum"></label><input type="text" id="geboortedatum">
    <span id="errGeboortedatum" class="error"></span>
</div>

<div class="veld">
    <label>Email:</label>
    <label for="email"></label><input type="text" id="email">
    <span id="errEmail" class="error"></span>
</div>

<div class="veld">
    <label>Aantal kinderen:</label>
    <label for="kinderen"></label><input type="text" id="kinderen">
    <span id="errKinderen" class="error"></span>
</div>

<button id="btnValideer">Valideer</button>

<script src="scripts/index.js"></script>
</body>
</html>
