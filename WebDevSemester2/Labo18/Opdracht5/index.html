<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="utf-8"/>
    <title>Opdracht 5 – ColorPicker uitbreiding</title>
    <link rel="stylesheet" href="styles/index.css"/>
</head>
<body>
    <div id="colorpicker">
        <div id="sliders">
            <label>R: <input type="range" id="sliderR" min="0" max="255" value="128"/></label>
            <label>G: <input type="range" id="sliderG" min="0" max="255" value="128"/></label>
            <label>B: <input type="range" id="sliderB" min="0" max="255" value="128"/></label>
        </div>
        <div id="swatch"></div>
        <button id="btnSave">Save</button>
    </div>

    <div id="savedColors"></div>

    <script src="scripts/index.js"></script>
</body>
</html>
